<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order - The Mystic Grills</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            width: 100%;
        }
        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            width: 50%;
            margin-top: 20px;
        }
        input, textarea, select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #ffcc00;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #ffaa00;
        }
        #order-summary {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>The Mystic Grills</h1>
        <button id="dark-mode-toggle">🌙</button>
    </header>
    <div class="container">
        <h2>Place Your Order</h2>
        <form id="orderForm">
            <label for="name">Customer Name</label>
            <input type="text" id="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" required>

            <label for="address">Address</label>
            <textarea id="address" rows="3" required></textarea>
            <button type="button" onclick="fetchLiveAddress()">Use Live Address</button>

            <label for="date">Order Date</label>
            <input type="date" id="date" required>

            <label for="quantity">Number of Dishes</label>
            <input type="number" id="quantity" required min="1" oninput="generateDishSelection()">

            <div id="dish-selection"></div>

            <button type="submit">Place Order</button>
        </form>

        <div id="order-summary">
            <h3>Order Summary</h3>
            <p><strong>Name:</strong> <span id="summary-name"></span></p>
            <p><strong>Email:</strong> <span id="summary-email"></span></p>
            <p><strong>Phone:</strong> <span id="summary-phone"></span></p>
            <p><strong>Address:</strong> <span id="summary-address"></span></p>
            <p><strong>Order Date:</strong> <span id="summary-date"></span></p>
            <p><strong>Number of Dishes:</strong> <span id="summary-quantity"></span></p>
            <p><strong>Dishes:</strong></p>
            <ul id="summary-dishes"></ul>
            <p><strong>Delivery Boy Contact:</strong> <span id="delivery-contact">+1 234 567 890</span></p>
        </div>
    </div>
    <script>
        function fetchLiveAddress() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                        const data = await response.json();
                        document.getElementById("address").value = data.display_name;
                    } catch (error) {
                        alert("Failed to fetch address. Try again!");
                    }
                }, function() {
                    alert("Geolocation permission denied or unavailable.");
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }
        
        function generateDishSelection() {
            let quantity = document.getElementById("quantity").value;
            let dishSelection = document.getElementById("dish-selection");
            dishSelection.innerHTML = "";
            
            for (let i = 0; i < quantity; i++) {
                let typeLabel = document.createElement("label");
                typeLabel.textContent = `Dish ${i + 1} Type:`;
                let typeSelect = document.createElement("select");
                typeSelect.innerHTML = "<option>Veg</option><option>Non-Veg</option>";
                
                let itemLabel = document.createElement("label");
                itemLabel.textContent = `Dish ${i + 1} Item:`;
                let itemSelect = document.createElement("select");
                itemSelect.innerHTML = "<option>Pizza</option><option>Burger</option><option>Pasta</option><option>Salad</option>";
                
                dishSelection.appendChild(typeLabel);
                dishSelection.appendChild(typeSelect);
                dishSelection.appendChild(itemLabel);
                dishSelection.appendChild(itemSelect);
            }
        }
        
        document.getElementById("orderForm").addEventListener("submit", function(event) {
            event.preventDefault();
            document.getElementById("summary-name").innerText = document.getElementById("name").value;
            document.getElementById("summary-email").innerText = document.getElementById("email").value;
            document.getElementById("summary-phone").innerText = document.getElementById("phone").value;
            document.getElementById("summary-address").innerText = document.getElementById("address").value;
            document.getElementById("summary-date").innerText = document.getElementById("date").value;
            document.getElementById("summary-quantity").innerText = document.getElementById("quantity").value;
            
            let dishList = document.getElementById("summary-dishes");
            dishList.innerHTML = "";
            
            let selects = document.querySelectorAll("#dish-selection select");
            for (let i = 0; i < selects.length; i += 2) {
                let type = selects[i].value;
                let item = selects[i + 1].value;
                let listItem = document.createElement("li");
                listItem.innerText = `${type} - ${item}`;
                dishList.appendChild(listItem);
            }
            
            document.getElementById("order-summary").style.display = "block";
        });
    </script>
</body>
</html>
