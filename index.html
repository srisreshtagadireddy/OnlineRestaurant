<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mystic Grills</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            text-align: center;
            margin-top: 70px; /* Adjusted for navbar */
        }
        .navbar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px;
            background: white;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .navbar a {
            text-decoration: none;
            color: black;
            font-size: 16px;
            font-weight: bold;
            padding: 10px;
        }
        .navbar a.active {
            border-bottom: 2px solid #c45f2e;
        }
        .banner {
            position: relative;
            width: 100%;
            height: 100vh;
            background: url('background.jpg') no-repeat center center/cover;
        }
        .banner .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
        }
        .banner .overlay h1 {
            font-size: 60px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
        }
        .banner .overlay p {
            font-size: 20px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
            }
            .navbar a {
                padding: 8px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar with links -->
    <div class="navbar">
        <a href="Menu.html">Menu</a>
        <a href="order.html">Order</a> 
        <img src="Logo.jpg" alt="Mystic Grills Logo" height="50">
        <a href="AboutUs.html">About Us</a>
        <a href="Contactus.html">Contact Us</a>
        <a href="job.html">Job Portal</a> <!-- Added Job Portal Link -->
    </div>

    <!-- Banner section -->
    <div class="banner">
        <div class="overlay">
            <h1>The Mystic Grills</h1>
            <p>BENGALURU</p>
            <p>UNITED BY FLAVORS</p>
        </div>
    </div>
</body>
</html>
