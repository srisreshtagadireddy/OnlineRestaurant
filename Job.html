<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mystic Grills - Job Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }

        header, footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
        }

        .container {
            width: 80%;
            margin: 20px auto;
        }

        .job-listings {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        .job-card {
            background-color: white;
            border: 2px solid #ddd;
            padding: 30px;
            width: 40%;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
            font-size: 18px;
        }

        .requirements {
            background-color: #f9f9f9;
            padding: 15px;
            border-left: 6px solid #5c6bc0;
            font-size: 18px;
            text-align: left;
        }

        .btn {
            background-color: #5c6bc0;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            background-color: #3949ab;
        }

        #apply-form {
            display: none;
            background-color: white;
            padding: 40px;
            border: 2px solid #ddd;
            width: 60%;
            margin: 40px auto;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
            font-size: 20px;
        }

        .apply-form input, .apply-form textarea, .apply-form select {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            font-size: 18px;
            border: 2px solid #ccc;
            border-radius: 5px;
        }

        .apply-form button {
            background-color: #5c6bc0;
            color: white;
            padding: 15px 20px;
            font-size: 20px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
        }

        .apply-form button:hover {
            background-color: #3949ab;
        }

        .close-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 18px;
            cursor: pointer;
            float: right;
        }

        @media (max-width: 768px) {
            .job-card {
                width: 90%;
            }
            #apply-form {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <header>Welcome to The Mystic Grills Job Portal</header>
    <div class="container">
        <section id="job-listings">
            <h2 style="text-align: center; font-size: 26px;">Current Job Openings</h2>
            <div class="job-listings" id="job-container"></div>
        </section>
        <section id="apply-form">
            <button class="close-btn" onclick="hideForm()">X</button>
            <h2>Apply for <span id="job-title"></span></h2>
            <form class="apply-form">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="tel" name="phone" placeholder="Phone Number" required>
                <select name="experience" required>
                    <option value="">Select Experience Level</option>
                    <option value="No Experience">No Experience</option>
                    <option value="1-2 Years">1-2 Years</option>
                    <option value="3-5 Years">3-5 Years</option>
                    <option value="5+ Years">5+ Years</option>
                </select>
                <textarea name="coverLetter" rows="5" placeholder="Cover Letter (optional)"></textarea>
                <label for="resume">Upload Resume:</label>
                <input type="file" name="resume" id="resume" accept=".pdf,.doc,.docx" required>
                <button type="submit">Submit Application</button>
            </form>
        </section>
    </div>
    <footer>&copy; 2025 The Mystic Grills | All Rights Reserved</footer>
    <script>
        const jobs = [
            {
                title: "Bartender",
                description: "Prepare and serve drinks.",
                requirements: [
                    "Experience in making cocktails.",
                    "Responsible alcohol service knowledge.",
                    "Ability to work under pressure.",
                    "Good customer service skills."
                ]
            },
            {
                title: "Chef",
                description: "Prepare high-quality meals.",
                requirements: [
                    "Proven chef experience.",
                    "Creativity in new dishes.",
                    "Kitchen hygiene knowledge.",
                    "Good teamwork skills."
                ]
            },
            {
                title: "Waiter",
                description: "Serve food and drinks to customers.",
                requirements: [
                    "Good communication skills.",
                    "Experience in customer service.",
                    "Ability to multitask in a fast-paced environment.",
                    "Basic knowledge of food safety."
                ]
            },
            {
                title: "Dishwasher",
                description: "Maintain cleanliness of dishes and kitchen utensils.",
                requirements: [
                    "No prior experience required.",
                    "Ability to work quickly and efficiently.",
                    "Commitment to cleanliness and hygiene.",
                    "Ability to handle hot and wet conditions."
                ]
            },
            {
                title: "Restaurant Manager",
                description: "Oversee daily operations of the restaurant.",
                requirements: [
                    "Proven experience as a restaurant manager.",
                    "Strong leadership and communication skills.",
                    "Ability to manage staff and resolve conflicts.",
                    "Understanding of financial management and budgeting."
                ]
            }
        ];

        function loadJobs() {
            const jobContainer = document.getElementById("job-container");
            jobContainer.innerHTML = "";
            jobs.forEach(job => {
                const jobCard = document.createElement("div");
                jobCard.classList.add("job-card");

                jobCard.innerHTML = `
                    <h3>${job.title}</h3>
                    <p>${job.description}</p>
                    <div class="requirements">
                        <strong>Requirements:</strong>
                        <ul>${job.requirements.map(req => `<li>${req}</li>`).join("")}</ul>
                    </div>
                    <button class="btn" onclick="showForm('${job.title}')">Apply Now</button>
                `;
                jobContainer.appendChild(jobCard);
            });
        }

        function showForm(jobTitle) {
            document.getElementById("apply-form").style.display = "block";
            document.getElementById("job-title").innerText = jobTitle;
        }

        function hideForm() {
            document.getElementById("apply-form").style.display = "none";
        }

        document.addEventListener("DOMContentLoaded", loadJobs);
    </script>
</body>
</html>
